name: Build Android arm64-v8a

on:
  workflow_dispatch:

jobs:
  build-android-arm64-v8a:
    name: Build Android arm64-v8a
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 android
        continue-on-error: true

      - name: Write signing config
        shell: bash
        run: |
          test -f android/app/TestKey.jks
          cat > android/key.properties <<'EOF'
          storeFile=TestKey.jks
          storePassword=123321
          keyAlias=Test
          keyPassword=123321
          EOF

      - name: Set and Extract version
        shell: pwsh
        run: lib/scripts/build.ps1 android

      - name: Build Android arm64-v8a APK
        run: flutter build apk --release --split-per-abi --target-platform android-arm64 --dart-define-from-file=pili_release.json --pub

      - name: Rename APK
        shell: bash
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "PiliPlus_android_${{ env.version }}_arm64-v8a.apk"

      - name: Upload Android arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Android-arm64-v8a
          path: PiliPlus_android_*_arm64-v8a.apk
